name: Bootstrap rettspraksis.no (kjøres manuelt til fullstendig)

# Kjøres manuelt via Actions-fanen: Actions → Bootstrap rettspraksis.no → Run workflow.
# Henter ubegrenset antall sider per kjøring og tar opp til ~20 minutter
# (batch-optimalisert: 50 sider per API-kall).
# Første gangs bootstrapping av ~60 000 sider krever normalt én kjøring.
# Kjør på nytt hvis ny timeout oppstår – allerede hentede sider gjenbrukes.

on:
  workflow_dispatch: {}

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Hent alle sider fra rettspraksis.no (ingen MAX_NEW_PAGES-grense)
        run: python pipeline/rettspraksis.py

      - name: Bygg søkeindeks
        run: python pipeline/build_index.py

      - name: Commit data
        run: |
          git config user.name "jusjob-bot"
          git config user.email "jusjob-bot@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "Bootstrap rettspraksis $(date -u +%Y-%m-%d)"
          git push
