name: Oppdater rettskildedata (daglig)

on:
  schedule:
    - cron: "0 3 * * *"   # daglig kl 03:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Hent Stortinget
        continue-on-error: true
        run: python pipeline/stortinget.py

      - name: Hent Sivilombudet
        continue-on-error: true
        run: python pipeline/sivilombudet.py

      - name: Hent KUDOS (DFØ)
        continue-on-error: true
        run: python pipeline/kudos.py

      - name: Hent rettspraksis.no (maks 2000 nye sider per daglig kjøring)
        continue-on-error: true
        env:
          MAX_NEW_PAGES: "2000"
        run: python pipeline/rettspraksis.py

      - name: Bygg søkeindeks
        run: python pipeline/build_index.py

      - name: Commit data
        run: |
          git config user.name "jusjob-bot"
          git config user.email "jusjob-bot@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "Oppdater data $(date -u +%Y-%m-%d)"
          git pull --rebase
          git push

      - name: Last opp til GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: data

  deploy-pages:
    needs: scrape-and-build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
