name: Oppdater rettskildedata (daglig)

on:
  schedule:
    - cron: "0 3 * * *"   # daglig kl 03:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Hent Stortinget
        continue-on-error: true
        run: python pipeline/stortinget.py

      - name: Hent Sivilombudet
        continue-on-error: true
        run: python pipeline/sivilombudet.py

      - name: Hent KUDOS (DFØ)
        continue-on-error: true
        run: python pipeline/kudos.py

      - name: Hent rettspraksis.no (maks 2000 nye sider per daglig kjøring)
        continue-on-error: true
        env:
          MAX_NEW_PAGES: "2000"
        run: python pipeline/rettspraksis.py

      - name: Hent norwegian-laws rettsområde-indeks
        continue-on-error: true
        run: python pipeline/norwegian_laws.py

      - name: Hent Lovdata (lover, forskrifter, Norsk Lovtiend avd. 1)
        continue-on-error: true
        run: python pipeline/lovdata.py

      - name: Hent Forbrukertilsynet (vedtak, markedsråd, FKU, veiledninger)
        continue-on-error: true
        run: python pipeline/forbrukertilsynet.py

      - name: Hent regjeringen.no (proposisjoner, NOU, meldinger, rundskriv, høringer)
        continue-on-error: true
        run: python pipeline/regjeringen.py

      - name: Hent Datatilsynet (vedtak, varsler, uttalelser)
        continue-on-error: true
        run: python pipeline/datatilsynet.py

      - name: Hent Helsetilsynet (tilsynsrapporter, publikasjoner)
        continue-on-error: true
        run: python pipeline/helsetilsynet.py

      - name: Hent UNE (praksisnotater, referansevedtak)
        continue-on-error: true
        run: python pipeline/une.py

      - name: Hent KOFA (vedtak offentlige anskaffelser)
        continue-on-error: true
        run: python pipeline/kofa.py

      - name: Hent Konkurransetilsynet (vedtak, uttalelser)
        continue-on-error: true
        run: python pipeline/konkurransetilsynet.py

      - name: Hent Finanstilsynet (vedtak, tillatelser, rundskriv)
        continue-on-error: true
        run: python pipeline/finanstilsynet.py

      - name: Hent Skatteklagenemnda (vedtak)
        continue-on-error: true
        run: python pipeline/skatteklagenemnda.py

      - name: Hent Skatteetaten (BFU, prinsipputtalelser, uttalelser)
        continue-on-error: true
        run: python pipeline/skatteetaten.py

      - name: Hent LDO og Diskrimineringsnemnda (uttalelser, vedtak)
        continue-on-error: true
        run: python pipeline/diskriminering.py

      - name: Hent KFIR (avgjørelser immaterialrett)
        continue-on-error: true
        run: python pipeline/kfir.py

      - name: Hent Arbeidstilsynet (vedtak, tilsynsrapporter)
        continue-on-error: true
        run: python pipeline/arbeidstilsynet.py

      - name: Hent Riksrevisjonen (forvaltningsrevisjoner, rapporter)
        continue-on-error: true
        run: python pipeline/riksrevisjonen.py

      - name: Hent Domstol.no (utvalgte avgjørelser)
        continue-on-error: true
        run: python pipeline/domstol.py

      - name: Hent Helsedirektoratet (rundskriv, veiledere, tolkninger)
        continue-on-error: true
        run: python pipeline/helsedirektoratet.py

      - name: Hent Trygderetten (kjennelser)
        continue-on-error: true
        run: python pipeline/trygderetten.py

      - name: Hent Husleietvistutvalget (avgjørelser)
        continue-on-error: true
        run: python pipeline/husleietvistutvalget.py

      - name: Hent UDI regelverk (RS, PN, instrukser)
        continue-on-error: true
        run: python pipeline/udi.py

      - name: Hent NPE / Pasientskadenemnda (vedtak)
        continue-on-error: true
        run: python pipeline/npe.py

      - name: Bygg søkeindeks
        run: python pipeline/build_index.py

      - name: Commit data
        run: |
          git config user.name "jusjob-bot"
          git config user.email "jusjob-bot@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "Oppdater data $(date -u +%Y-%m-%d)"
          git pull --rebase
          git push

      - name: Kopier datafiler inn i web/ for Pages-publisering
        run: |
          cp data/search-index.json web/
          cp data/*.jsonl.gz web/ 2>/dev/null || true

      - name: Last opp til GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

  deploy-pages:
    needs: scrape-and-build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
